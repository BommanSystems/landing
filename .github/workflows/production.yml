name: Production

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "master"
        type: string
      email:
        description: "Deployment email"
        required: true
        type: string

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate branch input
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            echo "Branch name cannot be empty."
            exit 1
          fi
          echo "Branch to deploy: $BRANCH"

      - name: Verify user and email authorization
        env:
          ACCESS_JSON: ${{ secrets.DEPLOYMENT_ACCESS }}
          INPUT_EMAIL: ${{ github.event.inputs.email }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$ACCESS_JSON" ]; then
            echo "DEPLOYMENT_ACCESS secret is not set"
            exit 1
          fi

          AUTHORIZED_EMAIL=$(echo "$ACCESS_JSON" | jq -r --arg user "$ACTOR" '.[$user]')

          if [ "$AUTHORIZED_EMAIL" = "null" ]; then
            echo "User '$ACTOR' is not authorized to deploy"
            exit 1
          fi

          if [ "$INPUT_EMAIL" != "$AUTHORIZED_EMAIL" ]; then
            echo "Entered email does not match authorized email for $ACTOR"
            exit 1
          fi

          echo "Authorization successful for $ACTOR"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Email used**: ${{ github.event.inputs.email }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.event.inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
